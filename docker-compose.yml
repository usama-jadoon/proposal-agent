version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: proposal_agent_db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proposal_agent
    volumes:
      - proposal_agent_pgdata:/var/lib/postgresql/data

volumes:
  proposal_agent_pgdata:
