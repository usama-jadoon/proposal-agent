name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 3. Install dependencies (Clean install)
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4. Run Lint
      - name: Run ESLint
        run: npm run lint

      # 5. Run Type Check
      - name: Run Type Check
        run: npm run type-check

      # 6. Run Tests
      - name: Run Tests
        run: npm run test

      # 7. Run Production Build
      - name: Run Production Build
        run: npm run build
